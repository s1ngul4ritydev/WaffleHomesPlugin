# ============================================================
#  WaffleHomes Configuration
#  Plugin by WafflyCatt
# ============================================================

# ─── HOMES ───────────────────────────────────────────────────
# Maximum number of homes each player can set.
homes-limit: 6

# ─── TELEPORT WARMUP ─────────────────────────────────────────
# How many seconds a player must stand still before any teleport
# executes (/home, /rtp, /tpa accept, etc.).
# The actionbar counts down every second.
# Set to 0 to disable the warmup.
teleport-warmup: 8

# ─── RTP ─────────────────────────────────────────────────────
# Enable or disable the /rtp command.
rtp-enabled: true

# Minimum distance from world spawn for random teleport (blocks).
rtp-min-radius: 100

# Maximum distance from world spawn for random teleport (blocks).
rtp-max-radius: 3000

# Cooldown between /rtp uses, in seconds.
rtp-cooldown: 10

# Maximum number of attempts to find a safe RTP location before giving up.
rtp-max-attempts: 50

# Radius (blocks) within which other players must NOT be present for /rtp.
# If any other player is within this radius, /rtp is blocked.
# Set to 0 to disable this check.
rtp-nearby-radius: 8

# ─── TPA ─────────────────────────────────────────────────────
# Enable or disable all /tpa, /tphere, and related commands.
tpa-enabled: true

# How long (in seconds) a teleport request stays active before expiring.
request-timeout: 30

# How long (in seconds) a player must wait before sending another request.
request-cooldown: 8

# ─── ADMINS ──────────────────────────────────────────────────
# Players listed here automatically have access to all WaffleHomes
# admin commands (/adminhomes, /adminedithomes, /admindelhomes),
# regardless of any permission plugin.
#
# Matching is case-insensitive.
# Supports both Java Edition and Bedrock Edition (Floodgate) usernames.
#
# Example:
#   admins:
#     - WafflyCatt
#     - ExampleAdmin
#
admins:
  - WafflyCatt
