# ============================================================
#  WaffleHomes Messages
#  Supports & color codes (e.g. &a = green, &c = red, &6 = gold)
#  Supports {placeholders} as documented per message.
# ============================================================

prefix: "&8[&6WaffleHomes&8] "

# ─── GENERAL ─────────────────────────────────────────────────
no-permission: "&cYou don't have permission to do that."
player-only: "&cThis command can only be used by players."
player-not-found: "&cPlayer &e{player}&c is not online."

# ─── TELEPORT WARMUP ─────────────────────────────────────────
# Shown on the actionbar every second during warmup countdown.
# {time} = seconds remaining
teleport-warmup: "&eTeleporting in &6&l{time}s&e... Don't move!"

# Shown (with prefix) when the player moves and the countdown is cancelled.
teleport-cancelled-moved: "&cTeleport cancelled &8— &cyou moved!"

# ─── HOMES ───────────────────────────────────────────────────
home-set: "&aHome &e{name}&a set!"
home-set-overwrite: "&aHome &e{name}&a updated!"
home-limit-reached: "&cYou've reached your home limit &8(&e{limit}&8)&c."
home-not-found: "&cNo home named &e{name}&c found."
home-deleted: "&cHome &e{name}&c deleted."
home-teleporting: "&aTeleporting to &e{name}&a..."
home-renamed: "&aHome &e{old}&a renamed to &e{new}&a."
home-list-header: "&6&lYour Homes &8({count}/{limit})"
home-list-entry: " &8• &e{name} &7— &f{world} &8(&7{x}, {y}, {z}&8)"
home-list-empty: "&7You have no homes yet. Use &e/sethome <name>&7 to set one."
home-invalid-name: "&cHome names can only contain letters, numbers, hyphens, and underscores (max 32 chars)."
home-icon-set: "&aIcon for &e{name}&a set to &e{icon}&a."

# ─── RTP ─────────────────────────────────────────────────────
rtp-disabled: "&cRandom teleport is disabled on this server."
rtp-searching: "&eSearching for a safe location..."
rtp-success: "&aTeleported you to a random location!"
rtp-failed: "&cCould not find a safe location. Try again."
rtp-cooldown: "&cYou must wait &e{time}&c seconds before using /rtp again."
# Shown when other players are too close for /rtp
# {count} = number of nearby players, {radius} = configured radius
rtp-players-nearby: "&cCannot use /rtp &8— &e{count}&c player(s) are within &e{radius}&c blocks of you."

# ─── TPA ─────────────────────────────────────────────────────
tpa-disabled: "&cTeleport requests are disabled on this server."
tpa-sent: "&aTeleport request sent to &e{player}&a."
tpa-self: "&cYou cannot send a teleport request to yourself."
tpa-already-pending: "&cYou already have a pending request to &e{player}&c."
tpa-cooldown: "&cYou must wait &e{time}&c seconds before sending another request."
tpa-target-no-tpa: "&e{player}&c has disabled TPA requests."
tpa-target-no-tphere: "&e{player}&c has disabled TPHERE requests."

# Message sent to the TARGET of a /tpa request (Java — clickable chat)
tpa-request-received: "&e{from} &6wants to teleport &eto you. &8(expires in {timeout}s)"
# Message sent to the TARGET of a /tphere request
tphere-request-received: "&e{from} &6wants to &eteleport you&6 to them. &8(expires in {timeout}s)"

# Floodgate form titles and content (Bedrock players)
tpa-form-title: "Teleport Request"
tpa-form-content: "{from} wants to teleport to you!\nExpires in {timeout} seconds."
tphere-form-title: "Teleport Request"
tphere-form-content: "{from} wants to summon you to their location!\nExpires in {timeout} seconds."
tpa-form-accept: "Accept ✓"
tpa-form-deny:   "Deny ✗"

tpa-accepted-sender: "&a{player}&a accepted your teleport request."
tpa-accepted-target: "&aYou accepted &e{player}&a's teleport request."
tpa-denied-sender: "&c{player}&c denied your teleport request."
tpa-denied-target: "&cYou denied &e{player}&c's teleport request."
tpa-expired-sender: "&cYour teleport request to &e{player}&c expired."
tpa-expired-target: "&cThe teleport request from &e{player}&c expired."
tpa-no-pending: "&cYou have no pending teleport requests."
tpa-no-pending-from: "&cYou have no pending request from &e{player}&c."
tphere-sent: "&aSummon request sent to &e{player}&a."

# ActionBar messages
actionbar-teleporting: "&aTeleported!"

# ─── TP SETTINGS ─────────────────────────────────────────────
tpsettings-updated: "&aSettings updated!"

# GUI titles (Java players)
gui-homes-title: "&6&l⌂  Your Homes"
gui-action-title: "&6{name}"
gui-tpsettings-title: "&6&l✦  Teleport Settings"
gui-adminhomes-title: "&6&l⌂  {player}'s Homes"

# ─── ADMIN ───────────────────────────────────────────────────
admin-home-deleted: "&cDeleted home &e{home}&c from &e{player}&c."
admin-home-renamed: "&aRenamed home &e{old}&a to &e{new}&a for &e{player}&a."
admin-no-homes: "&e{player}&c has no homes."
